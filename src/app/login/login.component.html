<div class="container min-vh-100 d-flex justify-content-center align-items-center flex-column">

    <h1 class="text-center">Login</h1>
    <p class="text-center">Explore 100+ RECIPIES in your hand....</p>

    <div class="shadow border rounded p-4 p-md-5 mt-4 w-100"
         style="max-width:400px;">

        <div class="mb-3 text-center">
            <h3>
                <i class="fa-solid fa-utensils fa-flip me-2 fs-2"></i>
                Flavour-fusion
            </h3>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="login()">
           <!-- email -->
            <div class="mb-3">
                <input type="email"
                       name="email"
                       formControlName="email"
                       placeholder="Enter your email"
                       class="form-control">
            </div>

            <!--to get invalid email ,touched is used even we touched field and not enter data...then display invalidemail -->
            @if (loginForm.get("email")?.errors && loginForm.get("email")?.touched) {
                <div class="text-danger fw-bold mb-2">
                    *Invalid email
                </div>
            }
            <!-- password with toggle -->
            <div class="mb-3 position-relative">
                <input [type]="showPassword?'text':'password'"
                       name="password"
                       formControlName="password"
                       placeholder="Enter your password"
                       class="form-control pe-5">
                           <!-- toggle button to show password -->
                       <button type="button"
                       class="btn position-absolute top-50 end-0 translate-middle-y me-2 border-0 bg-transparent"
                       (click)="togglePassword()">
                        
                       <i class="fa-solid"
                       [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
                       </i>

                       </button>
            </div>

            @if (loginForm.get("password")?.errors && loginForm.get("password")?.touched) {
                <div class="text-danger fw-bold mb-2">
                    *Invalid password
                </div>
            }

            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Login
                </button>
            </div>

        </form>

    </div>

</div>
